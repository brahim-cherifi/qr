<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Donation - Scan & Approve</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container { width: 100%; max-width: 380px; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .header p { color: #9ca3af; font-size: 14px; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .qr-wrap {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: inline-block;
            margin: 16px 0;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .qr-wrap canvas, .qr-wrap img { display: block; }
        #status-text {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .steps { text-align: left; margin-top: 20px; }
        .step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .step-num {
            width: 24px; height: 24px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 11px;
            font-weight: 700; flex-shrink: 0;
        }
        .step-num.blue { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .step-num.yellow { background: rgba(234,179,8,0.2); color: #facc15; }
        .step-num.green { background: rgba(34,197,94,0.2); color: #4ade80; }
        .step p { color: #9ca3af; font-size: 13px; line-height: 1.4; }
        .btn {
            display: inline-block; padding: 10px 20px; background: #2563eb;
            color: #fff; border-radius: 8px; font-size: 14px; font-weight: 500;
            text-decoration: none; border: none; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #1d4ed8; }
        .footer { text-align: center; margin-top: 16px; }
        .footer p { font-size: 11px; color: #4b5563; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Donate 1 USDT</h1>
            <p>Scan - Approve - Auto-split to 6 charities</p>
        </div>

        <div class="card">
            <p id="status-text">Initializing...</p>

            <div id="qrcode" class="qr-wrap"></div>

            <div class="steps">
                <div class="step">
                    <div class="step-num blue">1</div>
                    <p>Open Trust Wallet → tap scan icon (top right)</p>
                </div>
                <div class="step">
                    <div class="step-num yellow">2</div>
                    <p>Scan this QR → tap "Confirm" on the approve popup</p>
                </div>
                <div class="step">
                    <div class="step-num green">3</div>
                    <p>Done! 1 USDT auto-splits to 6 charities</p>
                </div>
            </div>

            <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1);">
                <p style="font-size:12px;color:#6b7280;margin-bottom:8px;">Already on mobile?</p>
                <a id="mobile-link" href="#" class="btn">Open Approve Page</a>
            </div>
        </div>

        <div class="footer">
            <p>Powered by TRON &bull; USDT TRC20</p>
        </div>
    </div>

    <script src="qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
